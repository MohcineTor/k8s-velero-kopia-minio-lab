grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 3Gi
    storageClassName: "nfs-csi" # Adjust this to your cluster's storage class if needed
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: "nginx"
    hosts:
      - grafana.local
    path: /
prometheus:
  prometheusSpec:
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleSelector: {}
    evaluationInterval: 30s
    scrapeInterval: 30s

# Disable kube-state-metrics and node-exporter if your cluster provides them separately
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
